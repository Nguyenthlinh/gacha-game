<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Stickers Học Sinh</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/game.css?v=2">
    <style>
        .student-card {
            background: white;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border-left: 8px solid var(--secondary);
            transition: transform 0.2s;
        }
        .student-card:hover { transform: translateY(-5px); }
        .sticker-count {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--primary);
            line-height: 1;
        }
        .badge-milestone {
            font-size: 0.8rem;
            padding: 5px 10px;
            border-radius: 50px;
        }
        .bg-milestone-10 { background-color: #facc15; color: #000; }
        .bg-milestone-20 { background-color: #fb7185; color: #fff; }
        
        .btn-sticker {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 800;
        }
    </style>
</head>
<body style="background: #f8fafc;">
    <a href="index.html" class="btn btn-light m-3 position-absolute top-0 start-0 shadow-sm rounded-pill fw-bold text-primary">🏠 Trở Về</a>

    <div class="container py-5">
        <div class="text-center mb-5">
            <h1 class="title-text">⭐ Quản Lý Stickers ⭐</h1>
            <p class="text-muted">Tích lũy 10 đổi quà nhỏ, 20 đổi quà lớn!</p>
        </div>

        <!-- Thêm học sinh -->
        <div class="row justify-content-center mb-5">
            <div class="col-md-6">
                <div class="bubbly-panel d-flex gap-2">
                    <input type="text" id="studentNameInput" class="form-control rounded-pill px-4" placeholder="Nhập tên học sinh mới...">
                    <button class="btn btn-bubbly btn-success-bubbly" onclick="addStudent()">Thêm</button>
                </div>
            </div>
        </div>

        <!-- Danh sách học sinh -->
        <div class="row" id="studentList">
            <!-- Sẽ được load bằng JS -->
        </div>
    </div>

    <!-- Modal thông báo đổi quà -->
    <div class="modal fade" id="redeemModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4">
                <div class="modal-body text-center p-5">
                    <div style="font-size: 4rem;">🎉</div>
                    <h2 class="fw-bold mb-3" id="redeemTitle">Đến mốc đổi quà!</h2>
                    <p class="fs-5 mb-4" id="redeemMsg"></p>
                    <div class="d-flex justify-content-center gap-3">
                        <button class="btn btn-lg btn-success-bubbly px-4" id="btnRedeemAction">Đổi ngay!</button>
                        <button class="btn btn-lg btn-light border px-4" data-bs-dismiss="modal">Tích tiếp</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/students.js"></script>
</body>
</html>
