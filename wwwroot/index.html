<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qu qua quà</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/game.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center title-text mb-4">✨  Nhận Quà Nào ✨</h1>
        
        <div class="d-flex justify-content-center gap-3 mb-4 flex-wrap game-btn-group">
            <a href="mystery-cards.html" class="btn btn-bubbly" style="background: linear-gradient(45deg, #6a11cb, #2575fc); color:white; font-size: 1.5rem; padding: 15px 40px;">🎁 Chơi Hộp Quà Bí Ẩn</a>
        </div>
    </div>

    <!-- Cục Bong Bóng Quản Lý Sticker (Dành riêng cho Học Sinh) -->
    <div class="floating-admin-wrapper" data-bs-toggle="offcanvas" data-bs-target="#studentSidebar" style="bottom: 30px; text-decoration: none;" title="Quản Lý Stickers">
        <div class="floating-admin-btn" style="background: linear-gradient(135deg, #facc15, #f59e0b);">⭐</div>
    </div>

    <!-- Sidebar Quản Lý Học Sinh (Offcanvas) -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="studentSidebar" data-bs-focus="false" style="width: 1400px; max-width: 95vw;">
        <div class="offcanvas-header bg-light border-bottom">
            <h5 class="offcanvas-title fw-bold text-warning fs-3">⭐ Quản Lý Stickers Học Sinh</h5>
            <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body" style="background-color: #f8fafc;">
            <!-- Quản Lý Lớp Học -->
            <div class="bubbly-panel border-0 shadow-sm mb-4">
                <div class="row g-3 align-items-end">
                    <div class="col-md-5">
                        <label class="small text-muted fw-bold mb-1">Chọn Lớp Học:</label>
                        <select id="classSelector" class="form-select border-primary" onchange="onClassChange()">
                            <!-- Lớp học sẽ được load vào đây -->
                        </select>
                    </div>
                    <div class="col-md-5">
                        <label class="small text-muted fw-bold mb-1">Tên Lớp Mới:</label>
                        <div class="input-group">
                            <input type="text" id="newClassNameInput" class="form-select border-primary" placeholder="Ví dụ: 6A...">
                            <button class="btn btn-primary" onclick="createNewClassDirect()">+ Thêm</button>
                        </div>
                    </div>
                    <div class="col-md-2 text-end">
                        <button class="btn btn-sm btn-outline-danger rounded-pill" onclick="deleteCurrentClass()" title="Xóa lớp hiện tại">🗑️</button>
                    </div>
                </div>
            </div>

            <div class="row h-100">
                <!-- Bên trái: Nhập liệu -->
                <div class="col-md-3 mb-4">
                    <div class="bubbly-panel h-100 border-0 shadow-sm">
                        <h4 class="mb-3 text-warning" style="font-weight:800">Nhập Danh Sách</h4>
                        <p class="text-muted small">Mỗi tên một dòng. Ví dụ:<br>Nguyễn Văn A<br>Trần Thị B</p>
                        <textarea id="bulkStudentsInput" class="form-control mb-3" rows="15"></textarea>
                        <button class="btn btn-bubbly btn-success-bubbly w-100 mb-2" onclick="addBulkStudents()">Lưu Danh Sách</button>
                        <p class="text-center text-muted small mt-2">Tích lũy:<br><span class="fw-900 text-warning">10 🎁</span> đổi quà nhỏ <br> <span class="fw-900 text-warning">20 🏆</span> đổi quà lớn <br> <span class="fw-900 text-warning">30 👑</span> đổi quà vip !</p>
                    </div>
                </div>
                
                <!-- Bên phải: Danh sách học sinh -->
                <div class="col-md-9 mb-4">
                    <div class="bubbly-panel h-100 border-0 shadow-sm" style="overflow-y: auto;">
                        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                            <h4 id="classListTitle" class="text-primary m-0" style="font-weight:800">Danh Sách Lớp</h4>

                            <!-- Trạng thái bình thường -->
                            <div id="normalButtons" class="d-flex gap-2 flex-wrap">
                                <button class="btn btn-sm btn-success rounded-pill px-3" onclick="addStickerToWholeClass()">⭐ Cộng cả lớp</button>
                                <button class="btn btn-sm btn-outline-primary rounded-pill px-3" onclick="toggleAddMode()">✅ Cộng nhiều</button>
                                <button class="btn btn-sm btn-outline-danger rounded-pill px-3" onclick="toggleSelectMode()">🗑️ Xóa nhiều</button>
                                <button class="btn btn-sm btn-light border rounded-pill px-3" onclick="clearAllStudents()">Dọn dẹp lớp</button>
                            </div>

                            <!-- Trạng thái Cộng nhiều -->
                            <div id="addModeButtons" class="d-flex gap-2 flex-wrap align-items-center d-none">
                                <span class="text-primary fw-bold small">Cộng <span id="addSelectedCount">0</span> học sinh:</span>
                                <input type="number" id="stickerAmountInput" class="form-control form-control-sm" style="width:70px" value="1" min="1" max="99">
                                <button class="btn btn-sm btn-primary rounded-pill px-3" onclick="addStickerToSelected()">⭐ Cộng cho đã chọn</button>
                                <button class="btn btn-sm btn-outline-secondary rounded-pill px-3" onclick="toggleAddMode()">❌ Hủy</button>
                            </div>

                            <!-- Trạng thái Xóa nhiều -->
                            <div id="deleteModeButtons" class="d-flex gap-2 flex-wrap d-none">
                                <button class="btn btn-sm btn-danger rounded-pill px-3" onclick="deleteSelectedStudents()">Xóa đã chọn (<span id="selectedCountSidebar">0</span>)</button>
                                <button class="btn btn-sm btn-outline-secondary rounded-pill px-3" onclick="toggleSelectMode()">❌ Hủy</button>
                            </div>
                        </div>
                        <div class="row g-3" id="studentListContainer">
                            <!-- JS sẽ render học sinh vào đây -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal thông báo đổi quà (Dùng chung cho Index) -->
    <div class="modal fade" id="redeemModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow-lg">
                <div class="modal-body text-center p-5">
                    <div style="font-size: 4rem;">🎉</div>
                    <h2 class="fw-bold mb-3" id="redeemTitle">Chúc mừng!</h2>
                    <p class="fs-5 mb-4" id="redeemMsg"></p>
                    <div class="d-flex justify-content-center gap-3">
                        <button class="btn btn-lg btn-success-bubbly px-4" id="btnRedeemAction">Đổi ngay!</button>
                        <button class="btn btn-lg btn-light border px-4" data-bs-dismiss="modal">Tích tiếp</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/admin.js"></script>
    <script src="js/student-admin.js"></script>
</body>
</html>
